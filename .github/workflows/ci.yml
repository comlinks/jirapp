name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: windows-latest
    steps:
      # Windows ランナーでの CRLF 自動変換による diff/format 誤検知を防ぐ。
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # フロント: TypeScript 型チェック + Vite ビルド。
      # tauri-build が frontendDist (../dist) の存在を要求するため Rust より先に実行する。
      - name: Vue/TypeScript check & build
        run: npm run build

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # Rust: ユニットテスト。
      - name: cargo test
        working-directory: src-tauri
        run: cargo test

  # Jira へ注入する静的 JS（src-tauri/src/inject/*.js）の Biome lint。
  # フロント（Vue/TS）は npm run build の型チェック側で担保するため対象外。
  # 設定は biome.json（includes を inject/*.js に限定・formatter off・lint のみ）。
  lint-inject:
    name: Lint injected JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: biomejs/setup-biome@v2
        with:
          version: 2.4.10
      - name: Biome lint
        run: biome lint --error-on-warnings
