name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: windows-latest
    steps:
      # Windows ランナーでの CRLF 自動変換による diff/format 誤検知を防ぐ。
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # フロント: TypeScript 型チェック + Vite ビルド。
      # tauri-build が frontendDist (../dist) の存在を要求するため Rust より先に実行する。
      - name: Vue/TypeScript check & build
        run: npm run build

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # Rust: ユニットテスト。
      - name: cargo test
        working-directory: src-tauri
        run: cargo test
