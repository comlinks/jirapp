name: Release

# v* タグの push で起動し、NSIS インストーラをビルドして
# GitHub Release（下書き）を作成・アセットを添付する。
# セルフアップデート用に latest.json も生成・添付する（updater 署名が必要）。
#
# 必要な GitHub Secret:
#   TAURI_SIGNING_PRIVATE_KEY — `tauri signer generate` で生成した秘密鍵の中身
#   （鍵をパスワード無しで生成した場合は PASSWORD secret は不要。空文字を渡す）

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build & Release
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action が beforeBuildCommand (npm run build) → cargo build → NSIS バンドルを実行し、
      # 生成物を下書きリリースに添付する。バンドル対象は tauri.conf.json の bundle.targets (nsis)。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # updater 用の署名。鍵はパスワード無しで生成しているため PASSWORD は空文字。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "jirapp ${{ github.ref_name }}"
          releaseBody: "アセットの NSIS インストーラ (_x64-setup.exe) をダウンロードしてインストールしてください。未署名（コード署名）のため初回起動時に SmartScreen 警告が出ることがあります（詳細情報 → 実行）。"
          releaseDraft: true
          prerelease: false
          # セルフアップデート用の latest.json を生成・添付する（NSIS を優先）。
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
