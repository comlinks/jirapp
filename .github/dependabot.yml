version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # サプライチェーン攻撃（公開直後の悪性バージョン）対策に、公開から一定日数
    # 経過したバージョンのみを提案させる。
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
