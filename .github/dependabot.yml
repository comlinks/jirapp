version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # サプライチェーン攻撃（公開直後の悪性バージョン）対策に、公開から一定日数
    # 経過したバージョンのみを提案させる。
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-*"
    ignore:
      # windows クレートは tauri/tao/wry が使うバージョン(現状 0.61)に揃える必要がある。
      # 先行して上げると sysmenu.rs の HWND 等の型が二重定義になりビルドが壊れるため、
      # 自動更新対象から外し、tauri 更新に合わせて手動で追従する。
      - dependency-name: "windows"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
